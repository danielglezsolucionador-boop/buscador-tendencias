<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Tendencias IA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: white;
    padding: 24px;
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 32px;
    background: linear-gradient(90deg, #00d2ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: #94a3b8; font-size: 14px; }
  .input-area {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .input-area label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
  input[type="text"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px;
    color: white;
    font-size: 15px;
    font-family: inherit;
  }
  input[type="text"]:focus { outline: none; border-color: #a855f7; }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ejemplos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .ejemplo {
    padding: 6px 12px;
    background: rgba(168,85,247,0.2);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #c4b5fd;
  }
  .ejemplo:hover { background: rgba(168,85,247,0.4); }
  .resultados { display: flex; flex-direction: column; gap: 16px; }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-nombre { font-size: 18px; font-weight: 700; }
  .score { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 700; }
  .score-alto { background: rgba(34,197,94,0.2); color: #4ade80; }
  .score-medio { background: rgba(234,179,8,0.2); color: #facc15; }
  .score-bajo { background: rgba(239,68,68,0.2); color: #f87171; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; margin-right: 6px; }
  .es-real { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .es-humo { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .es-viral { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
  .resumen { color: #cbd5e1; font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
  .areas { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .area-tag { padding: 3px 10px; background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); border-radius: 20px; font-size: 12px; color: #a5b4fc; }
  .como-ayuda { background: rgba(0,0,0,0.2); border-left: 3px solid #a855f7; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 13px; color: #94a3b8; }
  .fuente-tag { font-size: 12px; color: #64748b; margin-top: 8px; }
  .loading { text-align: center; padding: 40px; color: #94a3b8; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(168,85,247,0.3); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fecha { color: #64748b; font-size: 12px; text-align: center; margin-bottom: 24px; }
  .stats { display: flex; gap: 12px; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 Buscador de Tendencias IA</h1>
  <p>Tu agente personal que filtra lo útil del ruido</p>
</div>

<p class="fecha" id="fecha"></p>

<div class="input-area">
  <label>Escribe qué tendencia quieres buscar:</label>
  <input type="text" id="keyword" placeholder="Ejemplo: inteligencia artificial, ChatGPT, agentes IA..."/>
  
  <label style="margin-top: 16px;">Ejemplos rápidos:</label>
  <div class="ejemplos">
    <span class="ejemplo" onclick="buscar('ChatGPT imagenes')">🎨 ChatGPT imágenes</span>
    <span class="ejemplo" onclick="buscar('agentes IA autonomos')">🤖 Agentes autónomos</span>
    <span class="ejemplo" onclick="buscar('inteligencia artificial negocios')">💼 IA en negocios</span>
    <span class="ejemplo" onclick="buscar('Claude Anthropic')">🧠 Claude Anthropic</span>
  </div>

  <button class="btn" id="btnBuscar" onclick="buscar()">
    🔍 Buscar Tendencias
  </button>
</div>

<div id="resultados" class="resultados"></div>

<script>
document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

async function buscar(keyword) {
  const input = document.getElementById('keyword');
  const query = keyword || input.value.trim();
  if (keyword) input.value = keyword;
  if (!query) { alert('Escribe qué quieres buscar'); return; }

  const btn = document.getElementById('btnBuscar');
  btn.disabled = true;
  btn.textContent = '⏳ Buscando tendencias...';

  document.getElementById('resultados').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Buscando en X, TikTok y más...</p>
      <p style="font-size:12px;margin-top:8px">Detectando lo viral e importante</p>
    </div>`;

  try {
    const response = await fetch('/api/buscar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword: query })
    });

    const data = await response.json();
    if (!data.success) throw new Error(data.error);

    let html = '';

    if (data.analisis && data.analisis.length > 0) {
      html = data.analisis.map(t => {
        const scoreClass = t.puntuacion >= 7 ? 'score-alto' : t.puntuacion >= 4 ? 'score-medio' : 'score-bajo';
        return `
          <div class="card">
            <div class="card-header">
              <div class="card-nombre">${t.nombre}</div>
              <div class="score ${scoreClass}">${t.puntuacion}/10</div>
            </div>
            <span class="badge ${t.es_humo ? 'es-humo' : 'es-real'}">${t.es_humo ? '💨 Humo' : '✅ Real'}</span>
            ${t.es_viral ? '<span class="badge es-viral">🔥 VIRAL</span>' : ''}
            <p class="resumen">${t.resumen}</p>
            <div class="areas">${(t.areas_beneficiadas || []).map(a => `<span class="area-tag">${a}</span>`).join('')}</div>
            <div class="como-ayuda">💡 ${t.como_ayuda}</div>
            <div class="fuente-tag">📍 ${t.fuente || ''}</div>
          </div>`;
      }).join('');
    } else if (data.raw && data.raw.length > 0) {
      html = data.raw.map(t => `
        <div class="card">
          <div class="stats">
            <span style="color:#a5b4fc;font-weight:600">${t.fuente || ''}</span>
            <span>❤️ ${t.likes || 0}</span>
            <span>🔁 ${t.retweets || 0}</span>
            ${t.vistas ? `<span>👁️ ${t.vistas}</span>` : ''}
          </div>
          <p class="resumen">${t.texto || ''}</p>
        </div>`).join('');
    } else {
      html = '<div class="card"><p class="resumen">No se encontraron resultados.</p></div>';
    }

    document.getElementById('resultados').innerHTML = html;

  } catch (error) {
    document.getElementById('resultados').innerHTML = `
      <div class="card"><p style="color:#f87171">❌ ${error.message}</p></div>`;
  }

  btn.disabled = false;
  btn.textContent = '🔍 Buscar Tendencias';
}
</script>
</body>
</html>
